<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caio Resende | Portfolio 2026</title>
  <style>
    .loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease;
    }
    .loader.loaded { opacity: 0; pointer-events: none; }
    .loader-progress {
      font-family: "Gabarito", sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 800;
      color: #fff;
    }
  </style>
  <link rel="stylesheet" href="/styles-hero.css" />
  <link rel="stylesheet" href="/styles-icons.css" />
  <link rel="stylesheet" href="/styles-logos.css" />
  <link rel="stylesheet" href="/styles-projects.css" />
  <link rel="stylesheet" href="/styles-photos.css" />
</head>

<body>
  <div class="loader">
    <span class="loader-progress">0%</span>
  </div>

  <nav>
    <div class="site-name">
      <a href="#">Caio Resende</a>
    </div>
    <div class="nav-links">
      <a href="/resume.html" class="nav-resume">Resume</a>
      <div class="menu">
        <p>Menu</p>
        <div class="menu-dropdown">
          <a href="#home" class="menu-link">Home</a>
          <a href="#companies" class="menu-link">Companies</a>
          <a href="#projects" class="menu-link">Projects</a>
          <a href="#mentor" class="menu-link">Mentor</a>
        </div>
      </div>
    </div>
  </nav>
  <section id="home" class="hero">
    <canvas></canvas>
    <div class="hero-footer">
      <p>Scroll for more</p>
      <p>Portfolio 2026</p>
    </div>
  </section>

  <section id="companies" class="icons-section"></section>

  <section id="projects" class="projects"></section>

  <section id="mentor" class="photos-section">
    <div class="photos-text">
      <h2>Mentoring designers</h2>
    </div>
  </section>

  <script type="module" src="script-loader.js"></script>
</body>

</html>
